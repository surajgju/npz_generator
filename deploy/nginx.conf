# ==============================================================================
# Nginx Reverse Proxy Configuration for NPZ Generator & Streaming Avatar
# Place this file at /etc/nginx/sites-available/npz-generator
# Enable with: sudo ln -s /etc/nginx/sites-available/npz-generator /etc/nginx/sites-enabled/
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_NAME_OR_IP;

    # Redirect all HTTP traffic to HTTPS (will be populated automatically by Certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_NAME_OR_IP;

    # SSL Certificate Paths (Certbot will manage these lines once run)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_NAME/fullchain.pem;
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_NAME/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # High performance static file serving (Vite built directory)
    root /var/www/npz-generator/frontend/dist;
    index index.html;

    # Optimized security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Enable SharedArrayBuffer compatibility for WASM execution in browser
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Active Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # 1. Main Static Frontend Routing
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
        
        # Keep COOP/COEP headers on static root
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # 2. Dynamic WebSocket Streams (FastAPI Core Server on Port 8000)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        
        # Crucial WebSocket headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy parameters
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Turn off proxy buffering to prevent WebSocket delays and ensure real-time streaming
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # NOTE: All HTTP REST API endpoints and Admin/RAG control paths (port 8001) 
    # are completely private and accessible only locally from the loopback interface (127.0.0.1).
    #
    # To securely configure tenants or launch web crawls from your local machine,
    # establish an SSH tunnel:
    #     ssh -L 8001:127.0.0.1:8001 ubuntu@YOUR_EC2_IP
    # Then open http://localhost:8001/docs in your browser.

    # Allow large audio data packet uploads (e.g. for long viseme offline rendering)
    client_max_body_size 50M;

    # Logging directories
    access_log /var/log/nginx/npz_access.log;
    error_log /var/log/nginx/npz_error.log;
}
