<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live 3D Avatar Stream</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        color: #333;
        min-width: 180px;
        backdrop-filter: blur(6px);
      }
      #hud .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin: 2px 0;
      }
      #bufferBar {
        width: 180px;
        height: 6px;
        background: #eee;
        border-radius: 4px;
        overflow: hidden;
        margin: 6px 0;
      }
      #bufferFill {
        height: 100%;
        width: 0%;
        background: #4caf50;
      }
      #hud button {
        font-size: 11px;
        padding: 3px 6px;
        border: 1px solid #ddd;
        background: white;
        border-radius: 4px;
        cursor: pointer;
      }
      #hud .btns {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      #canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="row"><span>Status</span><span id="status">Connecting...</span></div>
      <div class="row"><span>Buffer</span><span id="bufferSec">0.0s</span></div>
      <div id="bufferBar"><div id="bufferFill"></div></div>
      <div class="row"><span>Queue</span><span id="queueLen">0</span></div>
      <div class="row"><span>In FPS</span><span id="inFps">0</span></div>
      <div class="row"><span>Out FPS</span><span id="outFps">0</span></div>
      <div class="row"><span>Play FPS</span><span id="playFps">30</span></div>
      <div class="row"><span>Stream FPS</span><span id="streamFps">20</span></div>
      <div class="row"><span>Pipeline</span><span id="pipelineMode">Worker</span></div>
      <div class="row"><span>Audio</span><span id="audioStatus">disabled</span></div>
      <div class="row"><span>Audio Buf</span><span id="audioBuffer">0.0s</span></div>
      <div class="row"><span>Playback</span><span id="playState">buffering</span></div>
      <div class="row"><span>LOD</span><span id="lodLevel">LOD0</span></div>
      <div class="btns">
        <button id="enableAudio">Enable Audio</button>
        <button id="togglePlay">Pause</button>
        <button id="clearBuffer">Clear Buffer</button>
        <button id="resetCam">Reset Cam</button>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js?v=audio9"></script>
  </body>
</html>
