# ==============================================================================
# Nginx Reverse Proxy — NPZ Generator Backend (WebSocket + Admin API)
# Place at: /etc/nginx/sites-available/npz-generator
# Enable:   sudo ln -s /etc/nginx/sites-available/npz-generator \
#                      /etc/nginx/sites-enabled/npz-generator
#
# NOTE: The React/Three.js frontend (npz_gen_front) is a separate repository
#       deployed independently (CDN / S3 / its own nginx vhost).
#       This config ONLY exposes the Python WebSocket backend.
#
# NOTE: The existing "livestock" site config is NOT touched by this file.
#       Each site has its own server_name, so Nginx routes them independently.
# ==============================================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_NAME_OR_IP;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS / WSS Virtual Host ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_NAME_OR_IP;

    # --- SSL (Certbot will populate and manage these lines) ---
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_NAME/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_NAME/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security Headers ---
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;

    # Required so browsers allow SharedArrayBuffer (WASM / Three.js workers)
    add_header Cross-Origin-Opener-Policy   "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp"  always;
    add_header Cross-Origin-Resource-Policy "cross-origin"  always;

    # Allow large audio payload uploads (long viseme offline rendering)
    client_max_body_size 50M;

    # --- Logging ---
    access_log /var/log/nginx/npz_access.log;
    error_log  /var/log/nginx/npz_error.log;

    # ── 1. WebSocket Endpoint (FastAPI Core Server — Port 8000) ───────────────
    # The frontend (hosted separately) connects via wss://YOUR_DOMAIN_NAME/ws/
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard reverse proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering — essential for low-latency real-time streaming
        proxy_buffering      off;
        proxy_read_timeout   86400s;
        proxy_send_timeout   86400s;
    }

    # ── 2. REST API Endpoint (FastAPI Core Server — Port 8000) ────────────────
    # Exposes HTTP REST routes (e.g. /api/health, /api/sessions) to the frontend.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 3. CORS Preflight for cross-origin frontend ───────────────────────────
    # Because the frontend is on a different origin (CDN / separate host),
    # Nginx must respond to OPTIONS preflight requests.
    location ~* ^/(ws|api)/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # ── Admin / RAG server (Port 8001) is intentionally NOT exposed here ──────
    # Access it exclusively via an SSH tunnel from your local machine:
    #   ssh -L 8001:127.0.0.1:8001 -i ~/Downloads/company_data/livestock_ssh_key.pem \
    #       ubuntu@livestock.universeumr.com
    # Then browse: http://localhost:8001/docs

    # ── Default: return 404 for anything else (no static files served here) ───
    location / {
        return 404;
    }
}
